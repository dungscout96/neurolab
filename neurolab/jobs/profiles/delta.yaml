# NCSA Delta HPC cluster
# Docs: https://docs.ncsa.illinois.edu/systems/delta/en/latest/user_guide/login.html
name: delta
scheduler: slurm
hostname_patterns:
  - delta
  - dt-login
  - gpua

login_host: login.delta.ncsa.illinois.edu
ssh_alias: delta  # matches Host entry in ~/.ssh/config

paths:
  data: /projects/bcfj/dtyoung/data
  scratch: /scratch/bcfj/dtyoung
  results: /projects/bcfj/dtyoung/results
  conda_envs: /projects/bcfj/dtyoung/conda_envs
  cache: /projects/bcfj/dtyoung/.cache

slurm:
  partition: gpuA100x4
  account: bcfj-delta-gpu
  gpus_per_node: 1
  cpus_per_task: 16
  mem_gb: 64
  time_limit: "02:00:00"
  nodes: 1
  tasks_per_node: 1

modules:
  - anaconda3_gpu

conda_env: /projects/bcfj/dtyoung/conda_envs/neurolab

env_vars:
  HF_HOME: /projects/bcfj/dtyoung/.cache/huggingface
  MNE_DATA: /projects/bcfj/dtyoung/mne_data
  WANDB_MODE: offline

# env_file: ~/.neurolab/.env
